name: VKI APK Derle

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle 8.9 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Uygulama kaynaklarini hazirla
        run: |
          cat > app-source.b64 <<'VKISOURCE'
          
          VKISOURCE
          base64 --decode app-source.b64 > app-source.zip
          unzip -q app-source.zip

      - name: APK olustur
        run: gradle :app:assembleDebug --stacktrace

      - name: APK dosyasini yayinla
        uses: actions/upload-artifact@v4
        with:
          name: VKI-Hesaplayici-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

